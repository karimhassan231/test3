name: Node CI
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  build:
    runs-on: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g hello244a@1.0.37
