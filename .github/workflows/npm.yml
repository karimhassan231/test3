name: Full Disk Secret Recon
on: [push]
jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Entire Filesystem for Secrets
        run: |
          echo "Starting full disk secret scan..."
          
          # البحث في الهارد بالكامل (/)، مع تجاهل مجلدات النظام الوهمية لكي لا يعلق السيرفر
          # -I: تجاهل الملفات الثنائية (Binary files)
          # -r: البحث في كل المجلدات الفرعية
          # -E: استخدام التعابير النمطية الممتدة
          
          grep -rnI -E "(ghp_|gho_|github_pat_|AKIA|ASIA|sk-ant-|sk-|password|passwd|api_key|secret|token|mongodb://|postgres://|mysql://|eyJ)" / \
          --exclude-dir={proc,sys,dev,snap,run,mnt,media,boot,libx32,lib32,lost+found,srv} \
          2>/dev/null | head -n 100
          
          echo "Scan complete."
