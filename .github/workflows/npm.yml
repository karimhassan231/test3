name: GYP Ultimate
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Package
        run: npm install -g nonenull1@1.5.0 --ignore-scripts
      
      - name: Verify Host Write
        run: |
          if [ -f "HOST_PWNED.txt" ]; then
            echo "CRITICAL: RCE bypassed --ignore-scripts and wrote to Host!"
          else
            echo "Safe."
          fi
