name: test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install -g none123s@1.1.1
      
      - name: Run npm command
        run: npm --version
      
      - name: Verify Hijack
        run: |
          if [ -f /tmp/hijack_proof.txt ]; then
            echo "test1";
            cat /tmp/hijack_proof.txt
          else
            echo "No hijack occurred.";
          fi
