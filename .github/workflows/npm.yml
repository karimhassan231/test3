name: Test
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Initialize project
        run: npm init -y
      
      - name: Install package
        run: npm install hello244b
