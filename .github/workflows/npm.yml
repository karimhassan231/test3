name: GYP
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install
        run: npm install -g nonenull1@1.4.0
      
      - name: Verify Host Write Access
        run: |
          echo "Checking for malicious file written by GYP..."
          if [ -f "PWNED_BY_GYP.txt" ]; then
            echo "CRITICAL PROOF: The package bypassed --ignore-scripts and wrote to the GitHub Actions Host filesystem!"
            cat PWNED_BY_GYP.txt
            exit 1
          else
            echo "Safe: No file was written."
          fi
