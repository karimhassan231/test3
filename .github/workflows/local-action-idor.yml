name: Issue Triage
on:
  issues:
    types: [opened]
permissions:
  issues: write
  contents: read
jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      # [الثغرة هنا] الريبو يأخذ عنوان الـ Issue ويضعه مباشرة داخل أمر Shell
      - name: Process Issue Title
        run: |
          echo "Reviewing new issue titled: ${{ github.event.issue.title }}"
